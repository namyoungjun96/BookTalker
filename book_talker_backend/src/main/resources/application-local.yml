spring:
    jpa:
        database: postgresql
        hibernate:
          ddl-auto: update
    datasource:
        driver-class-name: org.postgresql.Driver
        username: user
        password: password
        url: jdbc:postgresql://localhost:5432/book_talker_db
    security:
      oauth2:
        client:
          provider:
            naver:
              authorization-uri: https://nid.naver.com/oauth2.0/authorize
              token-uri: https://nid.naver.com/oauth2.0/token
              user-info-uri: https://openapi.naver.com/v1/nid/me
              user-name-attribute: response
          registration:
            naver:
              client-name: Naver
              client-id: gP9iCmsiOkKQNSlQRkqt
              client-secret: VhPBrEXpPt
              authorization-grant-type: authorization_code
              redirect-uri: http://localhost:8010/login/oauth2/code/naver
              scope:
                - id
                - name
                - email
                - gender
                - age
                - birthday
                - profile_image
                - birthyear
                - mobile

logging:
  level:
    root: debug
